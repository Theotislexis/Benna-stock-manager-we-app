appId: com.ikikecollective.securestockmanager
productName: Benna Stock Manager
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - node_modules/**/*
  - server/**/*
  - database.sqlite
  - package.json
win:
  target: nsis
  icon: build/icon.ico
mac:
  target: dmg
  icon: build/icon.icns
linux:
  target: AppImage
  icon: build/icon.png
